name: 自动更新牛价数据

on:
  # 每天早上9点自动运行
  schedule:
    - cron: '0 1 * * 5'
  # 也可以手动触发
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 设置Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 安装依赖
        run: |
          pip install requests beautifulsoup4 lxml

      - name: 运行数据更新
        run: |
          python data_update.py

      - name: 提交更新
        run: |
          git config --local user.email "gitee-actions@gitee.com"
          git config --local user.name "Gitee Actions"
          git add -A
          git diff --staged --quiet || git commit -m "自动更新数据 $(date '+%Y-%m-%d %H:%M')"
          git push
