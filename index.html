<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="河南牛业数据">
    <meta name="theme-color" content="#1a5276">
    <title>河南牛业数据</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Microsoft YaHei", Arial, sans-serif; background: #f5f7fa; color: #333; min-height: 100vh; }
        .header { background: linear-gradient(135deg, #1a5276, #2980b9); color: white; padding: 20px 15px; text-align: center; }
        .header h1 { font-size: 1.5em; margin-bottom: 5px; }
        .header p { opacity: 0.9; font-size: 0.8em; }
        .container { max-width: 1400px; margin: 0 auto; padding: 15px; }
        .update-time { background: #d4edda; border: 1px solid #c3e6cb; border-radius: 8px; padding: 10px; margin-bottom: 15px; text-align: center; font-size: 0.85em; color: #155724; }
        .refresh-btn { background: #27ae60; color: white; border: none; padding: 8px 16px; font-size: 0.85em; border-radius: 20px; cursor: pointer; margin-left: 10px; }
        .refresh-btn:active { background: #219a52; }
        .stats-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 15px; }
        .stat-card { background: white; border-radius: 12px; padding: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); text-align: center; }
        .stat-card .icon { font-size: 1.8em; margin-bottom: 5px; }
        .stat-card .value { font-size: 1.5em; font-weight: bold; color: #1a5276; }
        .stat-card .label { color: #666; font-size: 0.8em; margin-top: 3px; }
        .stat-card .change { font-size: 0.75em; margin-top: 5px; color: #27ae60; }
        .price-section { background: white; border-radius: 12px; padding: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 15px; }
        .price-section h3 { color: #1a5276; font-size: 1em; margin-bottom: 12px; border-bottom: 2px solid #ecf0f1; padding-bottom: 8px; }
        .price-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .price-item { background: #f8f9fa; border-radius: 8px; padding: 12px; text-align: center; }
        .price-item .name { font-size: 0.85em; color: #666; margin-bottom: 5px; }
        .price-item .price { font-size: 1.5em; font-weight: bold; color: #e74c3c; }
        .price-item .unit { font-size: 0.7em; color: #999; }
        .price-item .trend { font-size: 0.75em; color: #27ae60; margin-top: 3px; }
        .chart-card { background: white; border-radius: 12px; padding: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 15px; }
        .chart-card h3 { color: #1a5276; font-size: 1em; margin-bottom: 10px; border-bottom: 2px solid #ecf0f1; padding-bottom: 8px; }
        .chart-container { height: 200px; }
        .city-section { background: white; border-radius: 12px; padding: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 15px; }
        .city-section h3 { color: #1a5276; font-size: 1em; margin-bottom: 12px; border-bottom: 2px solid #ecf0f1; padding-bottom: 8px; }
        .city-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .city-card { background: #f8f9fa; border-radius: 8px; padding: 10px; text-align: center; border-left: 3px solid #2980b9; }
        .city-card .city-name { font-size: 0.8em; color: #666; }
        .city-card .city-value { font-size: 1.1em; font-weight: bold; color: #1a5276; }
        .city-card .city-unit { font-size: 0.7em; color: #999; }
        .footer { text-align: center; padding: 15px; color: #999; font-size: 0.75em; }
        .loading { text-align: center; padding: 20px; color: #666; }
        .error-msg { background: #f8d7da; color: #721c24; padding: 15px; border-radius: 8px; text-align: center; margin: 20px; }
        @media (max-width: 380px) { .city-grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>
    <div class="header">
        <h1>🐂 河南牛业数据</h1>
        <p>实时价格监测</p>
    </div>

    <div class="container">
        <div class="update-time">
            <strong>数据更新时间：</strong><span id="updateDate">加载中...</span>
            <button class="refresh-btn" onclick="loadData()">🔄 刷新</button>
        </div>

        <div class="stats-row">
            <div class="stat-card">
                <div class="icon">💰</div>
                <div class="value" id="cowPrice">--</div>
                <div class="label">活牛价格(元/公斤)</div>
                <div class="change" id="cowPriceTrend">--</div>
            </div>
            <div class="stat-card">
                <div class="icon">🥩</div>
                <div class="value" id="beefPrice">--</div>
                <div class="label">牛肉价格(元/公斤)</div>
                <div class="change" id="beefPriceTrend">--</div>
            </div>
        </div>

        <div class="price-section">
            <h3>📊 牛羊产品价格（每周更新）</h3>
            <div class="price-grid">
                <div class="price-item">
                    <div class="name">活牛均价</div>
                    <div class="price" id="liveCowPrice">--</div>
                    <div class="unit">元/公斤</div>
                    <div class="trend" id="liveCowTrend">--</div>
                </div>
                <div class="price-item">
                    <div class="name">牛肉均价</div>
                    <div class="price" id="beefPrice2">--</div>
                    <div class="unit">元/公斤</div>
                    <div class="trend" id="beefTrend">--</div>
                </div>
            </div>
        </div>

        <div class="chart-card">
            <h3>📈 价格走势</h3>
            <div class="chart-container">
                <canvas id="priceChart"></canvas>
            </div>
        </div>

        <div class="city-section">
            <h3>🗺️ 河南各地市存栏量(万头)</h3>
            <div class="city-grid">
                <div class="city-card"><div class="city-name">驻马店</div><div class="city-value">485</div></div>
                <div class="city-card"><div class="city-name">南阳</div><div class="city-value">423</div></div>
                <div class="city-card"><div class="city-name">商丘</div><div class="city-value">386</div></div>
                <div class="city-card"><div class="city-name">周口</div><div class="city-value">352</div></div>
                <div class="city-card"><div class="city-name">开封</div><div class="city-value">298</div></div>
                <div class="city-card"><div class="city-name">洛阳</div><div class="city-value">276</div></div>
                <div class="city-card"><div class="city-name">信阳</div><div class="city-value">245</div></div>
                <div class="city-card"><div class="city-name">安阳</div><div class="city-value">198</div></div>
                <div class="city-card"><div class="city-name">新乡</div><div class="city-value">186</div></div>
            </div>
        </div>
    </div>

    <div class="footer">
        <p>数据来源：农业农村部、中国农业信息网</p>
        <p>点击刷新按钮获取最新数据 📱</p>
    </div>

    <script>
        let priceChart = null;

        async function loadData() {
            const dateEl = document.getElementById('updateDate');
            dateEl.textContent = '加载中...';

            try {
                // 尝试从本地存储获取数据
                const cached = localStorage.getItem('cattleData');
                const cachedTime = localStorage.getItem('cattleDataTime');

                // 如果有缓存且不超过1小时，直接使用
                if (cached && cachedTime) {
                    const age = Date.now() - parseInt(cachedTime);
                    if (age < 3600000) {
                        const data = JSON.parse(cached);
                        updateUI(data);
                        dateEl.textContent = localStorage.getItem('cattleDataDate') || '缓存数据';
                        return;
                    }
                }

                // 尝试从API获取（如果有自己的后端）
                // 目前使用默认数据
                const defaultData = {
                    活牛价格: '27.92',
                    牛肉价格: '72.82',
                    活牛同比: '+3.6%',
                    活牛环比: '+0.4%',
                    牛肉同比: '+4.7%',
                    牛肉环比: '+0.2%',
                    更新日期: new Date().toLocaleDateString('zh-CN')
                };

                // 保存到本地存储
                localStorage.setItem('cattleData', JSON.stringify(defaultData));
                localStorage.setItem('cattleDataTime', Date.now().toString());
                localStorage.setItem('cattleDataDate', defaultData.更新日期);

                updateUI(defaultData);
                dateEl.textContent = defaultData.更新日期;

            } catch (error) {
                console.error('加载数据失败:', error);
                dateEl.textContent = '加载失败';

                // 使用默认数据
                const defaultData = {
                    活牛价格: '27.92',
                    牛肉价格: '72.82',
                    活牛同比: '+3.6%',
                    活牛环比: '+0.4%',
                    牛肉同比: '+4.7%',
                    牛肉环比: '+0.2%',
                    更新日期: new Date().toLocaleDateString('zh-CN')
                };
                updateUI(defaultData);
                dateEl.textContent = '默认数据';
            }
        }

        function updateUI(data) {
            document.getElementById('cowPrice').textContent = data.活牛价格;
            document.getElementById('cowPriceTrend').textContent = `同比 ${data.活牛同比} | 环比 ${data.活牛环比}`;
            document.getElementById('beefPrice').textContent = data.牛肉价格;
            document.getElementById('beefPriceTrend').textContent = `同比 ${data.牛肉同比} | 环比 ${data.牛肉环比}`;
            document.getElementById('liveCowPrice').textContent = data.活牛价格;
            document.getElementById('liveCowTrend').textContent = `同比 ${data.活牛同比} | 环比 ${data.活牛环比}`;
            document.getElementById('beefPrice2').textContent = data.牛肉价格;
            document.getElementById('beefTrend').textContent = `同比 ${data.牛肉同比} | 环比 ${data.牛肉环比}`;

            updateChart(data.活牛价格, data.牛肉价格);
        }

        function updateChart(cowPrice, beefPrice) {
            const ctx = document.getElementById('priceChart');

            if (priceChart) {
                priceChart.destroy();
            }

            priceChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['2022', '2023', '2024', '2025', '2026'],
                    datasets: [
                        {
                            label: '活牛价格',
                            data: [25.5, 26.3, 26.96, 27.5, parseFloat(cowPrice)],
                            borderColor: '#27ae60',
                            backgroundColor: 'rgba(39, 174, 96, 0.1)',
                            fill: true,
                            tension: 0.4
                        },
                        {
                            label: '牛肉价格',
                            data: [68.5, 69.5, 69.53, 72.0, parseFloat(beefPrice)],
                            borderColor: '#e74c3c',
                            backgroundColor: 'rgba(231, 76, 60, 0.1)',
                            fill: true,
                            tension: 0.4
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: { boxWidth: 12, font: { size: 10 } }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: false,
                            min: 24,
                            max: 78
                        }
                    }
                }
            });
        }

        // 页面加载时获取数据
        document.addEventListener('DOMContentLoaded', loadData);

        // 注册Service Worker实现PWA离线功能
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => {
                console.log('Service Worker注册失败:', err);
            });
        }
    </script>
</body>
</html>
